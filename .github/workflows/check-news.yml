name: Albea Veille

on:
  schedule:
    # Toutes les 10 minutes pendant les heures ouvrées (6h-22h heure Paris, UTC+2)
    - cron: '*/10 4-20 * * 1-5'   # Lun-Ven, 6h-22h Paris
    - cron: '0 6-20/2 * * 6,0'    # Week-end, toutes les 2h
  workflow_dispatch:               # Déclenchement manuel

permissions:
  contents: write                  # Permet au GITHUB_TOKEN de pousser history.json

jobs:
  check-news:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure history.json exists
        run: touch src/history.json && [ -s src/history.json ] || echo '{}' > src/history.json

      - name: Run veille
        run: python src/main.py
        env:
          FANTASYAI_API_KEY: ${{ secrets.FANTASYAI_API_KEY }}
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}

      - name: Commit history
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/history.json
          git commit -m "chore: update history.json" --no-verify || true

          # Robuste aux divergences (force-push, runs chevauchants) :
          # rebase sur le dernier main, en gardant la version fraiche de history.json
          # en cas de conflit, puis push avec retry.
          for i in 1 2 3; do
            git fetch origin main
            if git rebase origin/main; then
              :
            else
              git checkout --theirs src/history.json 2>/dev/null || true
              git add src/history.json
              git rebase --continue --no-verify || { git rebase --abort; }
            fi
            if git push origin main; then
              echo "Push OK (tentative $i)"
              exit 0
            fi
          done
          echo "Push history.json échoué après 3 tentatives (non bloquant)"