name: Albea Daily Digest

on:
  schedule:
    # 7h UTC = 8h Paris hiver / 9h Paris ete. Compromis acceptable pour ne pas
    # deriver selon DST. Si on veut strictement 8h, on peut ajouter un second
    # cron et adapter via une variable d'environnement, mais 7h UTC couvre les
    # deux saisons sans depasser 9h heure d'ete.
    - cron: '0 7 * * *'
  workflow_dispatch:               # Declenchement manuel

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare dirs
        run: |
          mkdir -p docs/resumes docs/assets
          touch src/history.json
          [ -s src/history.json ] || echo '{}' > src/history.json

      - name: Generate digest HTML
        id: digest
        run: |
          # Genere l'HTML avec un placeholder PUBLIC_URL (l'URL reelle sera
          # injectee apres l'upload 0x0.st)
          python src/daily.py

      - name: Upload digest to 0x0.st
        id: upload
        run: |
          # 0x0.st = paste HTML anonyme, public, permanent (1 an).
          # Retourne l'URL sur stdout, ex: https://0x0.st/abcd.html
          set -e
          URL=$(curl -fsSL -F "file=@docs/index.html" -F "expires=86400" \
                -A "AlbeaVeille/1.0" \
                https://0x0.st)
          echo "URL=${URL}" >> "$GITHUB_OUTPUT"
          echo "Digest upload: ${URL}"

      - name: Re-render with real public URL & send Bark notification
        if: steps.upload.outputs.URL
        env:
          PUBLIC_URL: ${{ steps.upload.outputs.URL }}
          FANTASYAI_API_KEY: ${{ secrets.FANTASYAI_API_KEY }}
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
        run: |
          # On regenere l'HTML avec la vraie URL publique et on re-envoie
          # la notif. Cote IA c'est gratuit (pas d'appel), donc no-cout.
          python src/daily.py