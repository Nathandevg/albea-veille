name: Albea Daily Digest

on:
  schedule:
    # 7h UTC = 8h Paris hiver / 9h Paris ete. Compromis acceptable pour ne pas
    # deriver selon DST. Si on veut strictement 8h, on peut ajouter un second
    # cron et adapter via une variable d'environnement, mais 7h UTC couvre les
    # deux saisons sans depasser 9h heure d'ete.
    - cron: '0 7 * * *'
  workflow_dispatch:               # Declenchement manuel

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare dirs
        run: |
          mkdir -p docs/resumes docs/assets
          touch src/history.json
          [ -s src/history.json ] || echo '{}' > src/history.json

      - name: Run TradingAgents market analysis
        env:
          FANTASYAI_API_KEY: ${{ secrets.FANTASYAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.FANTASYAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY || '' }}
        run: |
          pip install tradingagents 2>&1 | tail -3
          python daily_ta_analysis.py

      - name: Generate digest HTML
        id: digest
        env:
          FANTASYAI_API_KEY: ${{ secrets.FANTASYAI_API_KEY }}
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
        run: |
          python src/daily.py

      - name: Commit & push digest to repo (GitHub Pages)
        id: upload
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/digest.json docs/resumes/
          # trading_agents.json existe seulement si l'analyse reelle a tourne
          [ -f docs/trading_agents.json ] && git add docs/trading_agents.json || true
          git commit -m "chore: daily digest + TA $(date -u +%Y-%m-%d)" --no-verify || true

          for i in 1 2 3; do
            git fetch origin main
            if ! git rebase origin/main; then
              git checkout --theirs docs/index.html src/history.json 2>/dev/null || true
              git add docs/index.html src/history.json docs/trading_agents.json
              git rebase --continue --no-verify || { git rebase --abort; }
            fi
            if git push origin main; then
              echo "URL=https://Nathandevg.github.io/albea-veille/" >> "$GITHUB_OUTPUT"
              echo "Push + Pages OK (tentative $i)"
              exit 0
            fi
          done
          echo "Push echoue (non bloquant)" >&2