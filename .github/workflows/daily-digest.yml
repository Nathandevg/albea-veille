name: Albea Daily Digest

on:
  schedule:
    # 7h UTC = 8h Paris hiver / 9h Paris ete. Compromis acceptable pour ne pas
    # deriver selon DST. Si on veut strictement 8h, on peut ajouter un second
    # cron et adapter via une variable d'environnement, mais 7h UTC couvre les
    # deux saisons sans depasser 9h heure d'ete.
    - cron: '0 7 * * *'
  workflow_dispatch:               # Declenchement manuel

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare dirs
        run: |
          mkdir -p docs/resumes docs/assets
          touch src/history.json
          [ -s src/history.json ] || echo '{}' > src/history.json

      - name: Generate digest HTML
        id: digest
        env:
          FANTASYAI_API_KEY: ${{ secrets.FANTASYAI_API_KEY }}
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
        run: |
          # Genere l'HTML avec un placeholder PUBLIC_URL (l'URL reelle sera
          # injectee apres l'upload 0x0.st)
          python src/daily.py

      - name: Commit & push digest to repo (GitHub Pages)
        id: upload
        run: |
          # On commit le HTML dans le repo. GitHub Pages le sert avec le
          # bon Content-Type (text/html) et le bon rendu.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/digest.json docs/resumes/
          git commit -m "chore: daily digest $(date -u +%Y-%m-%d)" --no-verify || true

          for i in 1 2 3; do
            git fetch origin main
            if ! git rebase origin/main; then
              git checkout --theirs docs/index.html src/history.json 2>/dev/null || true
              git add docs/index.html src/history.json
              git rebase --continue --no-verify || { git rebase --abort; }
            fi
            if git push origin main; then
              # Le fichier est commité. GitHub Pages sert le dernier commit.
              echo "URL=https://Nathandevg.github.io/albea-veille/" >> "$GITHUB_OUTPUT"
              echo "Push + Pages OK (tentative $i)"
              exit 0
            fi
          done
          echo "Push echoue (non bloquant)" >&2

      - name: Re-render with real public URL & send Bark notification
        if: steps.upload.outputs.URL
        env:
          PUBLIC_URL: ${{ steps.upload.outputs.URL }}
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
        run: |
          # Mode --notify : re-render l'HTML avec la vraie URL + envoi notif.
          # Pas d'appel IA (le digest.json est deja genere).
          python src/daily.py --notify